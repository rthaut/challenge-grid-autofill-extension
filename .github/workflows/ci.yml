name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  validation:
    name: validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.1

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - run: npm run test:firefox
      - run: npm run build:chrome
      - run: npm run build:edge
      - run: npm run build:firefox
